<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width,initial-scale=1.0" name="viewport" />
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- CANVAS -->
  <div class="canvas-container">
    <canvas id="display-canvas"
    oncontextmenu="event.preventDefault()"
    tabindex="1"
    ></canvas>
  </div>

  <!-- INTERFACE -->
  <div id="menu">
    <!-- MENU BAR -->
    <div id="menu-menubar">
      <div class="menu-menubar-title selected_title" id="menu-menubar-title-inventory">inventaire</div>
      <div class="menu-menubar-title" id="menu-menubar-title-stats">stats</div>
      <div class="menu-menubar-title" id="menu-menubar-title-map">carte</div>
    </div>
    <!-- MENU BLOC -->
    <div id="menu-bloc">
      <div class="menu-bloc-all" id="menu-bloc-inventory">
        <div class="menu-bloc-inventory-cell"></div>
        <div class="menu-bloc-inventory-cell"></div>
        
      </div>
      <div class="menu-bloc-all" id="menu-bloc-stats">
        stats
      </div>
      <div class="menu-bloc-all" id="menu-bloc-map">
        carte
      </div>
    </div>
  </div>

  <!-- LIVELINK SDK -->
  <script src="https://cdn.3dverse.com/legacy/sdk/latest/SDK3DVerse.js"></script>
 
  <!-- APP ENTRYPOINT -->
  <script src="./main.js" type="module"></script>
</body>
</html>
