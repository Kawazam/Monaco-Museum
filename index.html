<html>
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <title>3dverse Sample: Coral Farm</title>
    <link
      rel="shortcut icon"
      href="https://cdn.3dverse.com/assets/3dverse-wordmark.svg"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="canvas-container">
      <!-- CANVAS -->
      <canvas
        id="display-canvas"
        tabindex="1"
        oncontextmenu="event.preventDefault()"
      ></canvas>
    </div>

    <!-- SDK 3DVERSE -->
    <script src="https://cdn.3dverse.com/legacy/sdk/stable/SDK3DVerse.js"></script>

    <!-- APP ENTRYPOINT -->
    <script src="./main.js" type="module"></script>

    <!--Coral listing-->
    <h1>Coral list</h1>
    <ul id="coralList"> 
      <!--On mettra les éléments de la liste ici-->  
      <li class="1st_coral"> Rock </li>  
      <li class="2nd_coral"> Caillou </li>
      <li class="3rd_coral"> Pierre </li>

    </ul>
  </body>
</html>
